<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>登入欄位讀取測試</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px;background:#f5f7fb}.card{background:#fff;border-radius:24px;padding:20px}input,button{width:100%;box-sizing:border-box;border:0;border-radius:16px;padding:16px;margin-top:10px;font-size:18px}input{background:#f3f4f6}button{background:linear-gradient(135deg,#FF87E0,#CCA4FF,#8089FF,#59DDFF);font-weight:900}pre{background:#111827;color:#fff;border-radius:14px;padding:12px;white-space:pre-wrap}</style></head><body><div class="card"><h1>讀取測試</h1><input id="loginId" value="ANG0603"><input id="loginPassword" type="password" value="12345678"><button onclick="testRead()">測試讀取</button><pre id="out">尚未測試</pre></div><script>function testRead(){var id=document.getElementById('loginId').value;var pw=document.getElementById('loginPassword').value;document.getElementById('out').textContent='讀到員工編號：'+id+'\n密碼長度：'+pw.length;}</script></body></html>
