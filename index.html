<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ANG HR Plus</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>ANG HR Plus</h1>
      <p>管理進階版｜審核、通知、排班、薪資試算</p>
    </section>
    <section class="card">
      <h2>Plus 功能入口</h2>
      <div class="grid">
        <button class="btn" data-action="getManagerBootstrapData">主管資料</button>
        <button class="btn" data-action="getAdminBootstrapData">管理資料</button>
        <button class="btn ghost" data-action="getPublishedScheduleForCalendar">正式班表</button>
        <button class="btn ghost" data-action="getShiftTypes">班別設定</button>
      </div>
      <div id="msg" class="message hidden"></div>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    const empId = localStorage.getItem('ang_hr_id') || '';
    const empToken = localStorage.getItem('ang_hr_token') || '';
    const msg = document.getElementById('msg');
    function show(text, ok) { msg.textContent = text; msg.className = ok ? 'message ok' : 'message'; }
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const res = await ANG_HR_API.post(btn.dataset.action, { id: empId, userId: empId, token: empToken, userToken: empToken });
        show(res.message || (res.ok ? '讀取成功' : '讀取失敗') || JSON.stringify(res), !!res.ok);
      });
    });
  </script>
</body>
</html>
