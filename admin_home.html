<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANG HR 跳轉中</title>
<script>
(function(){
  var map = {
    employee: 'employee_home.html',
    admin: 'admin_home.html',
    clock: 'employee_clock.html',
    mysalary: 'employee_salary.html',
    salary: 'employee_salary.html',
    upload: 'employee_upload.html',
    schedule: 'employee_schedule.html',
    leave: 'employee_schedule.html',
    review: 'admin_review.html',
    people: 'admin_people.html',
    settings: 'admin_settings.html',
    data: 'admin_data.html',
    notice: 'admin_notice.html',
    boss: 'admin_home.html',
    creator: 'admin_home.html',
    manager: 'admin_home.html',
    login: 'login.html',
    activate: 'activate.html'
  };
  var params = new URLSearchParams(location.search);
  var page = (params.get('page') || 'admin').toLowerCase().trim();
  var target = map[page] || 'admin_home.html';
  var keep = [];
  ['id','token','role','name'].forEach(function(k){
    var v = params.get(k);
    if(v) keep.push(encodeURIComponent(k)+'='+encodeURIComponent(v));
  });
  location.replace(target + (keep.length ? '?' + keep.join('&') : '') + '#clean-v7');
})();
</script>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fb;padding:24px;">
跳轉中...
</body>
</html>
