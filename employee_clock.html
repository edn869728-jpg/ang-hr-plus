<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#CCA4FF">
<title>ANG HR 打卡記錄</title>
<link rel="manifest" href="assets/pwa/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="assets/app.css?v=15">
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--c1:#FF87E0;--c2:#CCA4FF;--c3:#8089FF;--c4:#59DDFF;--deep:#8F4C7E;--grad:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c4))}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);padding:92px 10px 102px}
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.logo{width:72px;height:72px;border-radius:22px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px}
.brand{text-align:right}.brand-main{font-weight:900;color:var(--deep);font-size:16px}.brand-sub{font-size:11px;color:#9ca3af;font-weight:800;margin-top:3px}
.safe{max-width:980px;margin:0 auto}
.card{background:#fff;border-radius:22px;padding:14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.03)}
.title{font-size:18px;font-weight:900;margin:0 0 10px}.notice{background:linear-gradient(180deg,#fff,rgba(128,137,255,.06));border:1px solid rgba(128,137,255,.12);border-radius:18px;padding:13px;font-size:15px;line-height:1.55;color:#374151}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);padding:7px 4px calc(7px + env(safe-area-inset-bottom));border-radius:20px 20px 0 0;box-shadow:0 -5px 18px rgba(0,0,0,.08)}
.nav button{border:0;border-radius:16px;background:linear-gradient(180deg,#fff,rgba(255,135,224,.08));min-height:58px;color:#6b7280;font-weight:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.nav i{font-size:19px}.nav span{font-size:11px}.nav button.active{color:var(--deep);background:linear-gradient(135deg,rgba(255,135,224,.18),rgba(89,221,255,.3))}
.nav .main{transform:translateY(-12px);min-height:66px;border-radius:999px;background:var(--grad);color:#fff}
.hidden{display:none!important}
</style>
</head>
<body data-page="employee_clock">
<header class="topbar"><div class="logo">ANG</div><div class="brand"><div class="brand-main" id="brandName">ANG.lo Engine</div><div class="brand-sub" id="brandSub">HR 系統｜Plus</div></div></header>

<main id="main" class="safe">
  <section class="card">
    <h1 class="title">打卡記錄載入中...</h1>
    <div class="notice">正在載入打卡記錄。若仍顯示此段，請確認 assets/app.js 沒被覆蓋成空殼。</div>
  </section>
</main>

<nav id="employeeNav" class="nav">
  <button data-page-link="employee_schedule.html" data-feature="leave"><i class="fa-solid fa-calendar-check"></i><span>請假排班</span></button>
  <button data-page-link="employee_clock.html" data-feature="clock" class="active"><i class="fa-solid fa-clock-rotate-left"></i><span>打卡記錄</span></button>
  <button data-home-key="employee" class="main"><i class="fa-solid fa-house"></i><span>員工主頁</span></button>
  <button data-page-link="employee_salary.html" data-feature="salary"><i class="fa-solid fa-money-check-dollar"></i><span>薪資明細</span></button>
  <button data-page-link="employee_upload.html" data-feature="upload"><i class="fa-solid fa-file-arrow-up"></i><span>資料上傳</span></button>
</nav>

<nav id="adminNav" class="nav hidden">
  <button data-home-key="admin" data-feature="admin" class="main"><i class="fa-solid fa-house-user"></i><span>管理主頁</span></button>
  <button data-page-link="admin_review.html" data-feature="review"><i class="fa-solid fa-clipboard-check"></i><span>審核</span></button>
  <button data-page-link="admin_schedule.html" data-feature="admin_schedule"><i class="fa-solid fa-calendar-days"></i><span>排班</span></button>
  <button data-page-link="admin_people.html" data-feature="people"><i class="fa-solid fa-users"></i><span>人員</span></button>
  <button data-page-link="admin_settings.html" data-feature="settings"><i class="fa-solid fa-gear"></i><span>系統</span></button>
</nav>

<div id="toast" class="toast hidden"></div>

<script>
(function(){
  var legacyId = (localStorage.getItem('ang_employee_id') || localStorage.getItem('emp_logged_in') || localStorage.getItem('loginId') || '').trim().toUpperCase();
  if (!legacyId) location.replace('login.html?v=15');
})();
</script>
<script src="assets/config.js?v=15"></script>
<script src="assets/features.js?v=15"></script>
<script src="assets/api.js?v=15"></script>
<script src="assets/auth.js?v=15"></script>
<script src="assets/calendars.js?v=15"></script>
<script src="assets/app.js?v=15"></script>
</body>
</html>
