<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANG HR 清除快取</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;margin:0;padding:24px;color:#111827}
.card{background:#fff;border-radius:24px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08);max-width:720px;margin:0 auto}
button{width:100%;border:0;border-radius:18px;padding:16px;background:linear-gradient(135deg,#FF87E0,#CCA4FF,#8089FF,#59DDFF);font-weight:900;font-size:18px;color:#fff}
p{line-height:1.7;color:#374151}
</style>
</head>
<body>
<div class="card">
  <h1>ANG HR 清除快取</h1>
  <p>此頁會清除 localStorage / sessionStorage / Cache，清除後回登入頁。</p>
  <button id="btn">清除並回登入</button>
</div>
<script>
async function clearAll(){
  try{ localStorage.clear(); sessionStorage.clear(); }catch(e){}
  if('caches' in window){
    try{
      var keys = await caches.keys();
      await Promise.all(keys.map(function(k){ return caches.delete(k); }));
    }catch(e){}
  }
  location.replace('login.html?v=15');
}
document.getElementById('btn').addEventListener('click', clearAll);
clearAll();
</script>
</body>
</html>
