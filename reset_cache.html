<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ANG HR 清除快取</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;margin:0;padding:24px}.card{background:#fff;border-radius:24px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}button{width:100%;border:0;border-radius:18px;padding:16px;background:linear-gradient(135deg,#FF87E0,#CCA4FF,#8089FF,#59DDFF);font-weight:900;font-size:18px}</style></head>
<body><div class="card"><h1>ANG HR 清除快取</h1><p>清除後回登入。</p><button onclick="localStorage.clear();sessionStorage.clear();location.href='login.html?v=9';">清除並回登入</button></div>
<script>localStorage.clear();sessionStorage.clear();if('caches'in window){caches.keys().then(function(keys){return Promise.all(keys.map(function(k){return caches.delete(k)}));});}</script></body></html>
