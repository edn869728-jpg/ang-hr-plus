<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANG HR 清除登入快取</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;margin:0;padding:24px;color:#111827}
.card{background:#fff;border-radius:24px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
button{width:100%;border:0;border-radius:18px;padding:16px;background:linear-gradient(135deg,#FF87E0,#CCA4FF,#8089FF,#59DDFF);font-weight:900;font-size:18px}
</style>
</head>
<body>
<div class="card">
<h1>清除登入快取</h1>
<p>如果登入欄位出現 &lt;?= ... ?&gt;，按下面按鈕清除舊資料。</p>
<button onclick="localStorage.clear(); location.href='login.html?v=5';">清除並回登入</button>
</div>
<script>
localStorage.removeItem('ang_employee_id');
localStorage.removeItem('ang_hr_token');
localStorage.removeItem('ang_employee_name');
localStorage.removeItem('ang_employee_role');
</script>
</body>
</html>
