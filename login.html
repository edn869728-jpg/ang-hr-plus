<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>ANG HR Login</title>
  <script src="config.js"></script>
  <script src="assets/auth.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--c1:#FF87E0;--c2:#CCA4FF;--c3:#8089FF;--c4:#59DDFF;--deep:#8F4C7E;--grad:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c4))}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0%,rgba(255,135,224,.22),transparent 32%),radial-gradient(circle at 90% 20%,rgba(89,221,255,.28),transparent 34%),var(--bg);font-family:"Arial Rounded MT Bold","PingFang TC","Microsoft JhengHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px}.wrap{width:min(430px,100%)}.logo{width:82px;height:82px;border-radius:28px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;box-shadow:0 16px 34px rgba(128,137,255,.28);margin:0 auto 14px}.card{background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-radius:28px;padding:22px;box-shadow:0 18px 44px rgba(0,0,0,.09);border:1px solid rgba(255,255,255,.75)}h1{font-size:24px;margin:0;text-align:center;color:var(--deep);font-weight:900}.sub{text-align:center;color:var(--muted);font-size:13px;line-height:1.6;margin:8px 0 18px;font-weight:800}.label{font-size:13px;font-weight:900;color:var(--muted);margin:12px 0 7px}input{width:100%;height:50px;border:0;outline:0;background:#f3f4f6;border-radius:17px;padding:0 14px;font-size:16px;font-weight:800}button{width:100%;height:52px;border:0;border-radius:18px;background:var(--grad);color:#fff;font-size:16px;font-weight:900;margin-top:18px;box-shadow:0 12px 24px rgba(128,137,255,.18);cursor:pointer}.hint{font-size:12px;line-height:1.6;color:var(--muted);font-weight:800;margin-top:14px;background:#f8fafc;border-radius:16px;padding:12px}.status{font-size:13px;line-height:1.55;margin-top:12px;color:#92400e;background:#fff7ed;border:1px solid #fed7aa;border-radius:16px;padding:11px;font-weight:900;display:none}.status.ok{color:#065f46;background:#ecfdf5;border-color:#a7f3d0}.route{font-size:12px;color:#64748b;line-height:1.5;margin-top:10px;font-weight:800;word-break:break-word}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">ANG</div>
    <div class="card">
      <h1>ANG HR 登入</h1>
      <div class="sub">先確認公司方案，再自動分流到 Free / Basic / Plus / Premium。</div>
      <div class="label">公司代碼</div>
      <input id="company_id" autocomplete="organization" placeholder="例如 demo_free_001">
      <div class="label">員工編號</div>
      <input id="emp_id" autocomplete="username" placeholder="例如 ANG0603">
      <div class="label">密碼 / Token</div>
      <input id="password" type="password" autocomplete="current-password" placeholder="請輸入密碼">
      <button id="btnLogin" type="button">啟用並登入</button>
      <div id="status" class="status"></div>
      <div id="routeInfo" class="route"></div>
      <div class="hint">Free / Basic 共用 Basic；Trial / Premium 共用 Premium。試用到期未續費會由 Router 自動轉 Free。</div>
    </div>
  </div>
  <script>
    (function(){
      function qs(id){return document.getElementById(id)}
      function clean(v){return String(v==null?'':v).trim()}
      function setStatus(msg, ok){var el=qs('status');el.style.display='block';el.className='status'+(ok?' ok':'');el.textContent=msg}
      function readQuery(){var q={};try{new URLSearchParams(location.search).forEach(function(v,k){q[k]=v})}catch(e){}return q}
      var q=readQuery();
      qs('company_id').value=clean(q.company_id||q.companyId||localStorage.getItem('ang_hr_company_id')||'');
      qs('emp_id').value=clean(q.id||q.empId||localStorage.getItem('emp_id')||'').toUpperCase();
      qs('btnLogin').onclick=function(){
        var btn=qs('btnLogin');
        btn.disabled=true;btn.textContent='分流與登入中...';
        setStatus('正在詢問 Router...', false);
        ANG_HR_ROUTER_AUTH.loginWithRouter({
          company_id:qs('company_id').value,
          id:qs('emp_id').value,
          password:qs('password').value
        }).then(function(res){
          if(!res||!res.ok){setStatus((res&&res.message)||'登入失敗',false);btn.disabled=false;btn.textContent='啟用並登入';return;}
          var route=res.route||ANG_HR_ROUTER_AUTH.getRoute();
          qs('routeInfo').textContent='方案：'+route.plan+'｜公司：'+(route.company_name||route.company_id)+'｜入口：'+route.frontend_url;
          setStatus('登入成功，正在進入 '+String(route.plan||'').toUpperCase(), true);
          ANG_HR_ROUTER_AUTH.showUpgradePromptIfNeeded();
          setTimeout(function(){location.href=ANG_HR_ROUTER_AUTH.buildEntryUrl(route,res.session)},450);
        });
      };
    })();
  </script>
</body>
</html>
