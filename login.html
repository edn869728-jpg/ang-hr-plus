<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FF87E0">
<title>ANG HR Plus 登入</title>
<link rel="stylesheet" href="assets/app.css">
<style>
body{padding:96px 10px 40px}
.login-wrap{max-width:720px;margin:0 auto}
.login-card{background:#fff;border-radius:24px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.06)}

<style id="ang-inline-style-v10">

ba(255,135,224,.13);color:var(--deep);font-size:11px;font-weight:900;padding:6px 10px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.tile{background:linear-gradient(180deg,#fff,rgba(255,135,224,.06));border:1px solid rgba(255,135,224,.12);border-radius:18px;padding:13px}.tile b{display:block;font-size:15px}.tile span{display:block;color:var(--muted);font-size:14px;margin-top:6px;line-height:1.45}.btn{width:100%;border:0;border-radius:16px;padding:14px 10px;background:var(--grad);color:#fff;font-weight:900;font-size:15px;cursor:pointer}.btn.bigbtn{min-height:74px;font-size:18px}.btn.soft{background:linear-gradient(135deg,rgba(255,135,224,.18),rgba(89,221,255,.28));color:var(--deep);border:1px solid rgba(255,135,224,.18)}input,select,textarea{width:100%;border:0;outline:0;border-radius:16px;background:#f3f4f6;padding:14px 12px;font:inherit;font-size:16px;margin-bottom:10px}textarea{min-height:86px;resize:vertical}.label{display:block;font-size:14px;font-weight:900;color:var(--muted);margin:0 0 7px}.notice{background:linear-gradient(180deg,#fff,rgba(128,137,255,.06));border:1px solid rgba(128,137,255,.12);border-radius:18px;padding:13px;font-size:15px;line-height:1.55;color:#374151}.locked{background:#f8fafc;border:1px dashed #cbd5e1;color:#64748b}.calendar{background:#fff;border-radius:18px;border:1px solid rgba(128,137,255,.12);padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.day{min-height:80px;border-radius:12px;background:#f8fafc;padding:6px;font-size:13px;font-weight:900;overflow:hidden}.day small{display:block;color:#94a3b8;font-size:12px}.event{margin-top:5px;border-radius:8px;background:rgba(128,137,255,.16);color:#4D56B5;padding:4px 5px;font-size:12px;line-height:1.25;font-weight:900}.shift-event{display:flex;align-items:center;gap:4px}.dot{width:7px;height:7px;border-radius:999px;background:var(--c1);flex:0 0 auto}.shift-event .txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.shift-event.leave{background:#e5e7eb!important;color:#6b7280!important;text-decoration:line-through;opacity:.78}.shift-event.leave .dot{background:#9ca3af!important}.clock-in{background:#dcfce7;color:#047857}.clock-out{background:#fee2e2;color:#b91c1c}.clock-ot{background:#fef3c7;color:#92400e}.clock-fix{background:#ede9fe;color:#6d28d9}.salary-event{background:#dbeafe;color:#1d4ed8}.upload-pending{background:#fef3c7;color:#92400e}.upload-ok{background:#dcfce7;color:#047857}.upload-warn{background:#fee2e2;color:#b91c1c}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.legend span{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:900;color:#6b7280;background:#f8fafc;border-radius:999px;padding:6px 9px}.week-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-top:10px}.week-row .btn{flex:0 0 74px;min-width:74px;padding:13px 8px}.home-action-main{display:grid;grid-template-columns:1fr 1fr;gap:10px}.home-status{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.home-status .tile{text-align:center}.mini-action-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.mini-action{border:0;border-radius:18px;background:linear-gradient(135deg,rgba(255,135,224,.16),rgba(89,221,255,.24));color:var(--deep);padding:13px 6px;font-size:14px;font-weight:900;min-height:64px}.mini-action small{display:block;color:#6b7280;font-size:10px;margin-top:4px}.todo-grid{display:grid;gap:8px}.todo-item{display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:16px;background:linear-gradient(180deg,#fff,rgba(128,137,255,.06));border:1px solid rgba(128,137,255,.12);padding:12px}.todo-item b{font-size:14px}.todo-item span{font-size:12px;color:var(--muted);font-weight:800}.todo-pill{flex:0 0 auto;border-radius:999px;background:rgba(255,135,224,.14);color:var(--deep);padding:6px 9px;font-size:11px;font-weight:900}.table-wrap{overflow:auto;border-radius:18px;border:1px solid #eef2ff}table{border-collapse:collapse;width:100%;min-width:620px;background:#fff}th,td{padding:12px;border-bottom:1px solid #eef2ff;text-align:left;font-size:13px}th{background:#f8fafc;color:#64748b;font-weight:900}.nav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);padding:7px 4px calc(7px + env(safe-area-inset-bottom));border-radius:20px 20px 0 0;box-shadow:0 -5px 18px rgba(0,0,0,.08)}.nav button{border:0;border-radius:16px;background:linear-gradient(180deg,#fff,rgba(255,135,224,.08));min-height:58px;color:#6b7280;font-weight:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.nav i{font-size:19px}.nav span{font-size:11px}.nav button.active{color:var(--deep);background:linear-gradient(135deg,rgba(255,135,224,.18),rgba(89,221,255,.3))}.nav .main{transform:translateY(-12px);min-height:66px;border-radius:999px;background:var(--grad);color:#fff}.toast{position:fixed;left:16px;right:16px;bottom:96px;z-index:100;background:#111827;color:#fff;padding:12px 14px;border-radius:16px;font-size:14px;font-weight:800}.hidden{display:none!important}.active-type{outline:3px solid rgba(128,137,255,.45)}@media(min-width:760px){.day{min-height:100px}.event{font-size:13px}.week-row .btn{flex:1 1 0}}@media(max-width:390px){body{padding-left:6px;padding-right:6px}.card{padding:12px}.hello{font-size:21px}.nav span{font-size:10px}.day{min-height:72px;font-size:11px}.event{font-size:10px}.mini-action{font-size:13px}}

/* v10 inline style fix */
input, select, textarea {
  -webkit-appearance: none;
  appearance: none;
}
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 1000px #f3f4f6 inset !important;
  box-shadow: 0 0 0 1000px #f3f4f6 inset !important;
  -webkit-text-fill-color: #111827 !important;
}
body {
  background: #f5f7fb !important;
}

</style>
</head>
<body>
<header class="topbar">
  <div class="logo">ANG</div>
  <div class="brand">
    <div class="brand-main">ANG.lo Engine</div>
    <div class="brand-sub">HR 系統｜Plus｜5 店｜25 人</div>
  </div>
</header>

<main class="login-wrap">
  <section class="hero">
    <div class="hero-top">
      <div>
        <div class="hello">ANG HR 登入</div>
        <div class="hello-sub">請輸入員工編號與密碼</div>
      </div>
      <div class="chip">Plus</div>
    </div>
    <div class="shift">
      <div><small>授權額度</small><div class="big">5 店｜25 人</div></div>
      <div><small>版本狀態</small><div class="big">正常</div></div>
    </div>
  </section>

  <section class="login-card">
    <label class="label" for="loginId">員工編號</label>
    <input id="loginId" name="loginId" autocomplete="username" inputmode="text" autocapitalize="characters" placeholder="例如 ANG0603">

    <label class="label" for="loginPassword">密碼</label>
    <input id="loginPassword" name="loginPassword" type="password" autocomplete="current-password" placeholder="請輸入密碼">

    <div class="login-actions">
      <button class="btn" id="loginBtn" type="button">登入</button>
      <button class="btn soft" type="button" onclick="location.href='activate.html?v=9'">啟用 / 綁定帳號</button>
      <button class="btn gray" type="button" id="forgotBtn">忘記密碼 / 重設密碼</button>
    </div>

    <div id="debugBox" class="debug-box"></div>
  </section>
</main>

<div id="toast" class="toast hidden"></div>

<script src="assets/config.js"></script>
<script src="assets/api.js"></script>
<script src="assets/auth.js"></script>
<script>
(function(){
  function toast(message){
    var el=document.getElementById('toast');
    if(!el){ alert(message); return; }
    el.textContent=message;
    el.classList.remove('hidden');
    setTimeout(function(){ el.classList.add('hidden'); },2600);
  }

  function cleanId(v){
    v=String(v||'').trim();
    if(v.indexOf('<?')>=0 || v.indexOf('?>')>=0 || v.toUpperCase().indexOf('TYPEOF ID')>=0 || v.toUpperCase().indexOf('UNDEFINED')>=0) return '';
    return v.replace(/[^A-Za-z0-9_-]/g,'').toUpperCase();
  }

  function clearBadLoginCache(){
    var v=String(localStorage.getItem('ang_employee_id')||'');
    if(v.indexOf('<?')>=0 || v.indexOf('?>')>=0 || v.toUpperCase().indexOf('TYPEOF ID')>=0 || v.toUpperCase().indexOf('UNDEFINED')>=0){
      ['ang_employee_id','ang_employee_name','ang_employee_role','ang_hr_token'].forEach(function(k){localStorage.removeItem(k);});
    }
  }

  function saveLogin(res, id){
    if(window.ANG_HR_AUTH && typeof ANG_HR_AUTH.saveLogin==='function'){
      ANG_HR_AUTH.saveLogin(res);
      return;
    }
    localStorage.setItem('ang_employee_id', String(res.id || id || '').toUpperCase());
    localStorage.setItem('ang_employee_name', res.name || res.nickname || res.id || id || '');
    localStorage.setItem('ang_employee_role', String(res.role || 'employee').toLowerCase());
    localStorage.setItem('ang_hr_token', res.token || 'login-token');
  }

  async function doLogin(){
    var idInput=document.getElementById('loginId');
    var pwInput=document.getElementById('loginPassword');

    var id=cleanId(idInput ? idInput.value : '');
    var password=pwInput ? String(pwInput.value || '') : '';

    if(!id){
      toast('請輸入員工編號');
      if(idInput) idInput.focus();
      return;
    }

    var btn=document.getElementById('loginBtn');
    btn.disabled=true;
    btn.textContent='登入中...';

    var payload={
      id:id,
      employeeId:id,
      account:id,
      password:password,
      pwd:password
    };

    var res=await ANG_HR_API.post('login', payload);

    btn.disabled=false;
    btn.textContent='登入';

    if(!res || !res.ok){
      toast((res && (res.message || res.msg)) || '登入失敗');
      return;
    }

    saveLogin(res, id);
    toast('登入成功');

    var role=String(res.role || localStorage.getItem('ang_employee_role') || 'employee').toLowerCase();
    setTimeout(function(){
      location.href=(role==='admin'||role==='manager'||role==='creator')?'admin_home.html?v=9':'employee_home.html?v=9';
    },350);
  }

  async function forgotPassword(){
    var id=cleanId(document.getElementById('loginId').value);
    if(!id){ toast('請先輸入員工編號'); return; }
    var res=await ANG_HR_API.post('requestPasswordReset', {id:id, employeeId:id, account:id});
    toast((res && (res.message || res.msg)) || (res && res.ok ? '已送出重設申請' : '送出失敗'));
  }

  function fillSavedId(){
    clearBadLoginCache();
    var saved=cleanId(localStorage.getItem('ang_employee_id')||'');
    if(saved) document.getElementById('loginId').value=saved;
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('forgotBtn').addEventListener('click', forgotPassword);
  document.getElementById('loginPassword').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('loginId').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('loginPassword').focus(); });

  fillSavedId();

  if(location.search.indexOf('debug=1')>=0){
    var box=document.getElementById('debugBox');
    box.style.display='block';
    setInterval(function(){
      box.textContent='目前欄位讀取：\n員工編號=' + document.getElementById('loginId').value + '\n清理後=' + cleanId(document.getElementById('loginId').value);
    },500);
  }
})();
</script>
</body>
</html>
